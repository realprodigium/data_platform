services:
  - type: web
    name: finreport-hub
    runtime: python
    buildCommand: pip install uv && uv sync && bash build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DB_URL
        value: sqlite:///data/warehouse.db
    healthCheckPath: /
```

